<!DOCTYPE html>
<html lang="en" data-mode="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LocalisationService — Playground</title>
    <link rel="stylesheet" href="./playground.scss">
</head>
<body>
    <h3>LocalisationService Playground</h3>
    <div id="selector-mount"></div>
    <hr style="border-color: var(--border); margin: 16px 0;">
    <h4>data-localised attributes:</h4>
    <div class="term"><span data-localised="greeting">Hello</span></div>
    <div class="term"><span data-localised="farewell">Goodbye</span></div>
    <div class="term"><span data-localised="welcome">Welcome to the playground</span></div>
    <hr style="border-color: var(--border); margin: 16px 0;">
    <h4>Event log:</h4>
    <pre id="output"></pre>
    <script type="module" src="./main.js"></script>
</body>
</html>
